[[redirects]]
  from = "/banff"
  to = "/banff/index.html"
  status = 200

[[redirects]]
  from = "/tomorrowland"
  to = "/tomorrowland/index.html"
  status = 200

[build]
  publish = "."

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
