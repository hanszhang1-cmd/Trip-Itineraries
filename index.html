<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Itineraries</title>
  <style>
    :root {
      --bg: #0e0e0e; --surface: #1a1a1a; --border: #2a2a2a;
      --text: #e8e8e8; --muted: #999; --dim: #555;
      --accent: #4ade80; --accent-dim: rgba(74,222,128,.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; width: 100%; max-width: 600px; }
    a { text-decoration: none; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 18px;
      transition: border-color .15s, transform .15s;
      cursor: pointer;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-emoji { font-size: 28px; margin-bottom: 10px; }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .card-dates { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .card-arrow { font-size: 12px; color: var(--accent); }
    .card.soon { opacity: .45; cursor: default; }
    .card.soon:hover { border-color: var(--border); transform: none; }
    .soon-label { font-size: 11px; color: var(--dim); margin-top: 6px; }
    footer { color: var(--dim); font-size: 12px; margin-top: 40px; }
  </style>
</head>
<body>
  <h1>✈️ Trip Itineraries</h1>
  <div class="sub">Hans's travel hub</div>
  <div class="grid">

    <a href="/banff">
      <div class="card">
        <div class="card-emoji">🏔️</div>
        <div class="card-title">Banff Family Trip</div>
        <div class="card-dates">Jun 29 – Jul 6, 2026</div>
        <div class="card-arrow">View itinerary →</div>
      </div>
    </a>

    <a href="/tomorrowland">
      <div class="card soon">
        <div class="card-emoji">🎶</div>
        <div class="card-title">Tomorrowland</div>
        <div class="card-dates">Coming soon</div>
        <div class="soon-label">In progress</div>
      </div>
    </a>

  </div>
  <footer>Built with Claude</footer>
</body>
</html>
