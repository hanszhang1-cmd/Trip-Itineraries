<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Itineraries</title>
  <style>
    :root {
      --bg: #0e0e0e; --surface: #1a1a1a; --surface2: #222; --border: #2a2a2a;
      --text: #e8e8e8; --muted: #999; --dim: #555;
      --accent: #4ade80; --accent-dim: rgba(74,222,128,.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }

    /* ── HUB ── */
    #hub { display: none; flex-direction: column; align-items: center; width: 100%; }
    h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; letter-spacing: -.3px; }
    .sub { color: #aaa; font-size: 14px; margin-bottom: 36px; }
    .grid { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 480px; }
    a { text-decoration: none; }
    .card {
      background: #1c1c1c; border: 1px solid #333;
      border-radius: 18px; padding: 24px 22px;
      display: flex; align-items: center; gap: 18px;
      transition: border-color .15s, transform .15s, background .15s; cursor: pointer;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); background: #212121; }
    .card-emoji { font-size: 40px; flex-shrink: 0; line-height: 1; }
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 17px; font-weight: 700; margin-bottom: 5px; color: #f0f0f0; }
    .card-dates { font-size: 13px; color: #bbb; margin-bottom: 8px; }
    .card-arrow { font-size: 13px; color: var(--accent); font-weight: 600; }
    footer { color: #555; font-size: 12px; margin-top: 44px; }

    /* ── PIN SCREEN ── */
    #pin-screen {
      display: flex; flex-direction: column; align-items: center; gap: 32px;
    }
    .pin-title { font-size: 16px; font-weight: 600; color: var(--muted); letter-spacing: .5px; }
    .pin-dots {
      display: flex; gap: 16px;
    }
    .dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      transition: background .15s, border-color .15s;
    }
    .dot.filled { background: var(--accent); border-color: var(--accent); }
    .dot.error { background: #f87171; border-color: #f87171; }
    .keypad {
      display: grid; grid-template-columns: repeat(3, 72px); gap: 12px;
    }
    .key {
      height: 72px; border-radius: 50%; border: none;
      background: var(--surface); color: var(--text);
      font-size: 20px; font-weight: 500; cursor: pointer;
      transition: background .1s, transform .1s;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .key:hover { background: var(--surface2); }
    .key:active { transform: scale(.92); background: var(--surface2); }
    .key.empty { background: transparent; cursor: default; }
    .key.empty:hover { background: transparent; }
    .key.empty:active { transform: none; }
    .key-del { font-size: 16px; }

    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      20%    { transform: translateX(-8px); }
      40%    { transform: translateX(8px); }
      60%    { transform: translateX(-6px); }
      80%    { transform: translateX(6px); }
    }
    .shake { animation: shake .35s ease; }
  </style>
</head>
<body>

  <!-- PIN -->
  <div id="pin-screen">
    <div class="pin-title">Enter PIN</div>
    <div class="pin-dots" id="dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <input id="pin-input" type="tel" inputmode="numeric" maxlength="4"
           autocomplete="one-time-code"
           style="position:absolute;opacity:0;width:1px;height:1px;pointer-events:none">

    <div class="keypad" onclick="document.getElementById('pin-input').focus()">
      <button class="key" onclick="press('1')">1</button>
      <button class="key" onclick="press('2')">2</button>
      <button class="key" onclick="press('3')">3</button>
      <button class="key" onclick="press('4')">4</button>
      <button class="key" onclick="press('5')">5</button>
      <button class="key" onclick="press('6')">6</button>
      <button class="key" onclick="press('7')">7</button>
      <button class="key" onclick="press('8')">8</button>
      <button class="key" onclick="press('9')">9</button>
      <button class="key empty"></button>
      <button class="key" onclick="press('0')">0</button>
      <button class="key key-del" onclick="del()">⌫</button>
    </div>
  </div>

  <!-- HUB -->
  <div id="hub">
    <h1>✈️ Trip Itineraries</h1>
    <div class="sub">Hans's travel hub</div>
    <div class="grid">

      <a href="/banff">
        <div class="card">
          <div class="card-emoji">🏔️</div>
          <div class="card-body">
            <div class="card-title">Banff Family Trip</div>
            <div class="card-dates">Jun 29 – Jul 6, 2026</div>
            <div class="card-arrow">View itinerary →</div>
          </div>
        </div>
      </a>

      <a href="/tomorrowland">
        <div class="card">
          <div class="card-emoji">🎶</div>
          <div class="card-body">
            <div class="card-title">Tomorrowland 2026</div>
            <div class="card-dates">Jul 15 – 23, 2026</div>
            <div class="card-arrow">View itinerary →</div>
          </div>
        </div>
      </a>

      <a href="/toronto">
        <div class="card">
          <div class="card-emoji">🍁</div>
          <div class="card-body">
            <div class="card-title">Toronto Weekend</div>
            <div class="card-dates">Aug 7 – 9, 2026</div>
            <div class="card-arrow">View itinerary →</div>
          </div>
        </div>
      </a>

    </div>
    <footer>Built with Claude</footer>
  </div>

  <script>
    const PIN = '1218';
    const KEY = 'hub_auth';

    // Remember unlock for this browser session only (clears when tab/browser closed)
    if (sessionStorage.getItem(KEY) === 'ok') unlock(false);

    function unlock(save = true) {
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('hub').style.display = 'flex';
      if (save) sessionStorage.setItem(KEY, 'ok');
    }

    // ── Single source of truth: the hidden input value ──────────────────────
    const pinInput = document.getElementById('pin-input');

    // Auto-focus so keyboard typing works immediately
    setTimeout(() => pinInput.focus(), 50);
    document.getElementById('pin-screen').addEventListener('click', () => pinInput.focus());

    // Keypad buttons append to the hidden input directly
    function press(d) {
      if (pinInput.value.length >= 4) return;
      pinInput.value += d;
      handle();
    }
    function del() {
      pinInput.value = pinInput.value.slice(0, -1);
      handle();
    }

    // Keyboard typing fires the native input event
    pinInput.addEventListener('input', () => {
      pinInput.value = pinInput.value.replace(/\D/g, '').slice(0, 4);
      handle();
    });

    function handle() {
      const val = pinInput.value;
      // Update dots
      for (let i = 0; i < 4; i++) {
        document.getElementById('d' + i).classList.toggle('filled', i < val.length);
      }
      if (val.length < 4) return;

      if (val === PIN) {
        unlock();
      } else {
        const dots = document.getElementById('dots');
        dots.querySelectorAll('.dot').forEach(d => d.classList.add('error'));
        dots.classList.add('shake');
        setTimeout(() => {
          dots.querySelectorAll('.dot').forEach(d => d.classList.remove('filled','error'));
          dots.classList.remove('shake');
          pinInput.value = '';
        }, 600);
      }
    }
  </script>
</body>
</html>
